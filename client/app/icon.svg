<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .stroke { stroke: #171717; }
    @media (prefers-color-scheme: dark) {
      .stroke { stroke: #ededed; }
    }
  </style>
  <g fill="none" class="stroke" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer Postcard -->
    <rect x="6" y="20" width="88" height="60" rx="6" stroke-width="8" />
    
    <!-- Vertical Divider -->
    <line x1="50" y1="32" x2="50" y2="68" stroke-width="5" />
    
    <!-- Stamp -->
    <rect x="68" y="32" width="12" height="16" rx="2" stroke-width="5" />
    
    <!-- Lines on Left -->
    <line x1="18" y1="32" x2="32" y2="32" stroke-width="5" />
    <line x1="18" y1="44" x2="42" y2="44" stroke-width="5" />
    <line x1="18" y1="56" x2="42" y2="56" stroke-width="5" />
    <line x1="18" y1="68" x2="32" y2="68" stroke-width="5" />
  </g>
</svg>
